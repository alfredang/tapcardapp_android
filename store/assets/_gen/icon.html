<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:512px;height:512px;overflow:hidden}
  .icon{width:512px;height:512px;background:linear-gradient(135deg,#2563EB,#1E40AF);
        display:flex;align-items:center;justify-content:center}
  .card{width:300px;height:188px;background:#fff;border-radius:22px;
        box-shadow:0 18px 40px rgba(0,0,0,.25);display:flex;padding:26px 28px;gap:18px}
  .lines{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px}
  .l{height:14px;border-radius:7px}
  .l1{width:78%;background:#2563EB}
  .l2{width:60%;background:#93B4FB}
  .l3{width:48%;background:#cbd9fb}
  .qr{width:96px;height:96px;align-self:center;display:grid;
      grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:4px}
  .qr span{background:#2563EB;border-radius:3px}
  .qr .o{background:transparent}
</style></head><body>
  <div class="icon">
    <div class="card">
      <div class="lines"><div class="l l1"></div><div class="l l2"></div><div class="l l3"></div></div>
      <div class="qr">
        <span></span><span></span><span class="o"></span><span></span><span></span>
        <span></span><span class="o"></span><span class="o"></span><span></span><span class="o"></span>
        <span class="o"></span><span></span><span></span><span class="o"></span><span></span>
        <span></span><span class="o"></span><span></span><span></span><span></span>
        <span></span><span></span><span class="o"></span><span class="o"></span><span></span>
      </div>
    </div>
  </div>
</body></html>
